<script>

/*!
 * Color mode toggler adapted from Bootstrap's docs (https://getbootstrap.com/)
 * Copyright 2011-2023 The Bootstrap Authors
 * Licensed under the Creative Commons Attribution 3.0 Unported License.
 */
const THEME_ICONS = {
  light: 'M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z',
  dark: 'M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z',
  auto: 'M8 15A7 7 0 1 0 8 1v14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z'
}

const THEME_LABELS = {
  light: 'Color mode: light (click for dark)',
  dark: 'Color mode: dark (click for auto)',
  auto: 'Color mode: auto (click for light)'
}

const prefersDark = window.matchMedia('(prefers-color-scheme: dark)')

const getStoredTheme = () => localStorage.getItem('theme')

const getPreferredTheme = () => {
  const stored = getStoredTheme()
  if (stored === 'light' || stored === 'dark' || stored === 'auto') {
    return stored
  }
  return 'auto'
}

const applyTheme = (theme) => {
  const resolved = theme === 'auto'
    ? (prefersDark.matches ? 'dark' : 'light')
    : theme
  document.documentElement.setAttribute('data-bs-theme', resolved)
}

const updateToggleUI = (theme) => {
  const path = document.getElementById('themeIconPath')
  const btn = document.getElementById('btnSwitch')
  if (path) path.setAttribute('d', THEME_ICONS[theme])
  if (btn) {
    btn.setAttribute('aria-label', THEME_LABELS[theme])
    btn.setAttribute('title', THEME_LABELS[theme])
  }
}

const setTheme = (theme) => {
  if (theme === 'auto') {
    localStorage.removeItem('theme')
  } else {
    localStorage.setItem('theme', theme)
  }
  applyTheme(theme)
  updateToggleUI(theme)
}

const currentTheme = getPreferredTheme()
applyTheme(currentTheme)
updateToggleUI(currentTheme)

prefersDark.addEventListener('change', () => {
  if (getPreferredTheme() === 'auto') applyTheme('auto')
})

document.getElementById('btnSwitch').addEventListener('click', () => {
  const order = { auto: 'light', light: 'dark', dark: 'auto' }
  setTheme(order[getPreferredTheme()])
})
</script>
